<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reserva de Salas</title>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-light: #9a9a9a;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-text: #0C447C;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --green-text: #27500A;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --red-text: #791F1F;
    --amber-light: #FAEEDA;
    --amber-text: #633806;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* Layout */
  .app { max-width: 960px; margin: 0 auto; padding: 0 16px 60px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .logo { font-size: 18px; font-weight: 600; }
  .logo span { color: var(--blue); }
  .user-pill { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px 6px 8px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--blue-light); color: var(--blue-text); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .user-name { font-size: 13px; font-weight: 500; }

  /* Nav */
  nav { display: flex; gap: 2px; margin-bottom: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .nav-btn { padding: 7px 18px; border: none; background: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; }
  .nav-btn.active { background: var(--text); color: #fff; }
  .nav-btn:hover:not(.active) { background: var(--bg); color: var(--text); }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

  /* Room cards */
  .room-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .room-card:hover { border-color: var(--blue); }
  .room-card.selected { border: 2px solid var(--blue); }
  .room-accent { height: 4px; border-radius: 2px; margin-bottom: 14px; }
  .room-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .room-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .room-bar-wrap { background: var(--bg); border-radius: 3px; height: 5px; margin-bottom: 8px; }
  .room-bar { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .room-slots { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .badge-green { background: var(--green-light); color: var(--green-text); }
  .badge-red   { background: var(--red-light);   color: var(--red-text); }
  .badge-amber { background: var(--amber-light);  color: var(--amber-text); }
  .badge-blue  { background: var(--blue-light);   color: var(--blue-text); }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:640px){ .form-grid { grid-template-columns: 1fr; } }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
  input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: var(--blue); }

  /* Slots */
  .slots-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .slot { padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.1s; }
  .slot.free { background: var(--green-light); color: var(--green-text); border-color: #C0DD97; }
  .slot.taken { background: var(--bg); color: var(--text-light); cursor: not-allowed; text-decoration: line-through; }
  .slot.selected { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* Buttons */
  .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .btn-primary { background: var(--text); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline { background: none; border-color: var(--border-strong); color: var(--text); }
  .btn-outline:hover { background: var(--bg); }
  .btn-danger { background: none; border-color: var(--red); color: var(--red); font-size: 12px; padding: 5px 12px; }
  .btn-danger:hover { background: var(--red-light); }

  /* Summary */
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: var(--text-muted); }
  .summary-value { font-weight: 500; }

  /* Reservas list */
  .res-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .res-row:last-child { border-bottom: none; }
  .res-icon { width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .res-title { font-size: 13px; font-weight: 600; }
  .res-meta { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .res-right { text-align: right; flex-shrink: 0; }
  .res-date { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Filters */
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: flex-end; }

  /* Loading / toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--red); }

  .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">Reserva de <span>Salas</span></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="header-date" style="font-size:12px;color:var(--text-muted);"></div>
      <div class="user-pill">
        <div class="avatar" id="user-avatar">JG</div>
        <span class="user-name" id="user-display">Mi cuenta</span>
      </div>
    </div>
  </header>

  <!-- Login modal -->
  <div id="login-screen" style="max-width:400px;margin:60px auto;">
    <div class="card">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:22px;font-weight:700;margin-bottom:6px;">Reserva de Salas</div>
        <div style="font-size:13px;color:var(--text-muted);">Ingresá para continuar</div>
      </div>
      <div class="form-row">
        <label class="form-label">Tu nombre</label>
        <input type="text" id="login-nombre" placeholder="Ej: Juan García" />
      </div>
      <div class="form-row">
        <label class="form-label">Tu email</label>
        <input type="email" id="login-email" placeholder="juan@empresa.com" />
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="login()">Ingresar</button>
    </div>
  </div>

  <!-- Main app (oculto hasta login) -->
  <div id="main-app" style="display:none;">
    <nav>
      <button class="nav-btn active" onclick="showSection('disponibilidad')">Disponibilidad</button>
      <button class="nav-btn" onclick="showSection('reservar')">Reservar</button>
      <button class="nav-btn" onclick="showSection('mis-reservas')">Mis reservas</button>
      <button class="nav-btn" onclick="showSection('admin')">Admin</button>
    </nav>

    <!-- ── DISPONIBILIDAD ── -->
    <div id="disponibilidad" class="section active">
      <div class="filter-row">
        <div>
          <label class="form-label">Fecha</label>
          <input type="date" id="disp-fecha" style="width:160px;" onchange="renderDisponibilidad()"/>
        </div>
        <div>
          <label class="form-label">Capacidad mínima</label>
          <select id="disp-cap" style="width:140px;" onchange="renderDisponibilidad()">
            <option value="0">Cualquiera</option>
            <option value="4">4+ personas</option>
            <option value="8">8+ personas</option>
            <option value="12">12+ personas</option>
          </select>
        </div>
        <button class="btn btn-outline" onclick="loadData()">Actualizar</button>
      </div>
      <div id="salas-grid" class="card-grid"></div>
    </div>

    <!-- ── RESERVAR ── -->
    <div id="reservar" class="section">
      <div class="form-grid">
        <div>
          <div class="section-title">Nueva reserva</div>
          <div class="form-row">
            <label class="form-label">Sala</label>
            <select id="res-sala" onchange="onSalaChange()">
              <option value="">Seleccionar sala...</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label">Fecha</label>
            <input type="date" id="res-fecha" onchange="renderSlots()"/>
          </div>
          <div class="form-row">
            <label class="form-label">Horario disponible</label>
            <div class="slots-wrap" id="slots-wrap">
              <span style="font-size:12px;color:var(--text-muted);">Seleccioná sala y fecha</span>
            </div>
          </div>
          <div class="form-row">
            <label class="form-label">Motivo</label>
            <input type="text" id="res-motivo" placeholder="Ej: Reunión de equipo, entrevista..."/>
          </div>
          <div class="form-row">
            <label class="form-label">Asistentes estimados</label>
            <select id="res-asistentes">
              <option>1-3 personas</option>
              <option>4-6 personas</option>
              <option>7-10 personas</option>
              <option>10+ personas</option>
            </select>
          </div>
          <button class="btn btn-primary" id="btn-reservar" onclick="hacerReserva()" style="width:100%;margin-top:8px;">Confirmar reserva</button>
        </div>
        <div>
          <div class="section-title">Resumen</div>
          <div class="card" id="resumen-card" style="margin-bottom:14px;">
            <div id="resumen-body" style="color:var(--text-muted);font-size:13px;">Completá el formulario para ver el resumen.</div>
          </div>
          <div class="card">
            <div class="form-label" style="margin-bottom:8px;">Amenities de la sala</div>
            <div class="tags" id="amenities-wrap"><span style="font-size:12px;color:var(--text-muted);">—</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── MIS RESERVAS ── -->
    <div id="mis-reservas" class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="section-title" style="margin:0;">Mis reservas</div>
        <select style="width:150px;" onchange="renderMisReservas(this.value)">
          <option value="todas">Todas</option>
          <option value="proximas">Próximas</option>
          <option value="pasadas">Pasadas</option>
        </select>
      </div>
      <div class="card" id="mis-reservas-list"></div>
    </div>

    <!-- ── ADMIN ── -->
    <div id="admin" class="section">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-title">Todas las reservas</div>
      <div class="card" id="admin-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const SHEET_ID      = "14n3DULDNlHL6GP-XpiwA-rVABKUp_WRgp9KJpkRjclA";
// Reemplazá con la URL de tu Apps Script publicado
const SCRIPT_URL    = "PEGAR_URL_APPS_SCRIPT_AQUI";
const HORARIOS      = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"];
const COLORES       = ["#E6F1FB","#E1F5EE","#EEEDFE","#FAECE7","#FAEEDA","#EAF3DE"];
const COLORES_TEXT  = ["#0C447C","#085041","#3C3489","#712B13","#633806","#27500A"];
const ACCENT        = ["#185FA5","#0F6E56","#534AB7","#993C1D","#854F0B","#3B6D11"];

const HOY = new Date().toISOString().split("T")[0];

// ── STATE ──────────────────────────────────────────────────
let salas     = [];
let reservas  = [];
let usuario   = { nombre: "", email: "" };
let slotSel   = null;

// ── LOGIN ──────────────────────────────────────────────────
function login() {
  const nombre = document.getElementById("login-nombre").value.trim();
  const email  = document.getElementById("login-email").value.trim();
  if (!nombre || !email) { showToast("Completá nombre y email", true); return; }
  usuario = { nombre, email };
  const ini = nombre.split(" ").map(p=>p[0]).join("").substring(0,2).toUpperCase();
  document.getElementById("user-avatar").textContent  = ini;
  document.getElementById("user-display").textContent = nombre;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("main-app").style.display    = "block";
  document.getElementById("header-date").textContent   = new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
  document.getElementById("disp-fecha").value = HOY;
  document.getElementById("res-fecha").value  = HOY;
  loadData();
}

// ── CARGAR DATOS DESDE SHEET ───────────────────────────────
async function loadData() {
  try {
    salas    = await fetchSheet("Salas");
    reservas = await fetchSheet("Reservas");
    renderDisponibilidad();
    populateSalaSelect();
  } catch(e) {
    showToast("Error cargando datos. Verificá que el Sheet sea público.", true);
  }
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47, text.length - 2));
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows
    .filter(r => r && r.c && r.c[0] && r.c[0].v)
    .map(r => {
      const obj = {};
      cols.forEach((col, i) => {
        obj[col] = r.c[i] ? (r.c[i].v ?? "") : "";
      });
      return obj;
    });
}

// ── DISPONIBILIDAD ─────────────────────────────────────────
function renderDisponibilidad() {
  const fecha  = document.getElementById("disp-fecha").value || HOY;
  const capMin = parseInt(document.getElementById("disp-cap").value) || 0;
  const grid   = document.getElementById("salas-grid");
  const filtradas = salas.filter(s => {
    const cap = parseInt(s["Capacidad\n(personas)"] || s["Capacidad"] || 0);
    return cap >= capMin && (s["Estado"] || "").toLowerCase() === "activa";
  });
  if (!filtradas.length) { grid.innerHTML = `<div class="empty">No hay salas que coincidan con el filtro.</div>`; return; }
  grid.innerHTML = filtradas.map((s, idx) => {
    const id     = s["ID Sala"];
    const nombre = s["Nombre de sala"];
    const cap    = s["Capacidad\n(personas)"] || s["Capacidad"] || "?";
    const piso   = s["Piso"] || "?";
    const amenities = (s["Amenities"] || "").split(",").map(a=>a.trim()).filter(Boolean);
    const resHoy = reservas.filter(r => r["ID Sala"] === id && r["Fecha"] === fecha && r["Estado"] !== "Cancelada");
    const ocup   = resHoy.length;
    const total  = HORARIOS.length;
    const libres = Math.max(0, total - ocup);
    const pct    = Math.round((ocup / total) * 100);
    const color  = COLORES[idx % COLORES.length];
    const accent = ACCENT[idx % ACCENT.length];
    const badgeClass = libres > 4 ? "badge-green" : libres > 0 ? "badge-amber" : "badge-red";
    const badgeText  = libres > 4 ? "Disponible" : libres > 0 ? "Limitado" : "Ocupada";
    return `<div class="room-card">
      <div class="room-accent" style="background:${accent};"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <div>
          <div class="room-name">${nombre}</div>
          <div class="room-meta">Piso ${piso} · ${cap} personas</div>
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="room-bar-wrap"><div class="room-bar" style="width:${pct}%;background:${pct>70?"#E24B4A":pct>40?"#EF9F27":"#639922"};"></div></div>
      <div class="room-slots">${libres} horarios libres</div>
      <div class="tags">${amenities.map(a=>`<span class="tag">${a}</span>`).join("")}</div>
    </div>`;
  }).join("");
}

// ── RESERVAR ───────────────────────────────────────────────
function populateSalaSelect() {
  const sel = document.getElementById("res-sala");
  const val = sel.value;
  sel.innerHTML = `<option value="">Seleccionar sala...</option>` +
    salas.filter(s=>(s["Estado"]||"").toLowerCase()==="activa").map(s =>
      `<option value="${s["ID Sala"]}">${s["Nombre de sala"]} (cap. ${s["Capacidad\n(personas)"] || s["Capacidad"]})</option>`
    ).join("");
  if (val) sel.value = val;
}

function onSalaChange() {
  renderSlots();
  updateAmenities();
  updateResumen();
}

function renderSlots() {
  const salaId = document.getElementById("res-sala").value;
  const fecha  = document.getElementById("res-fecha").value;
  slotSel = null;
  const wrap = document.getElementById("slots-wrap");
  if (!salaId || !fecha) { wrap.innerHTML = `<span style="font-size:12px;color:var(--text-muted);">Seleccioná sala y fecha</span>`; return; }
  wrap.innerHTML = HORARIOS.map(h => {
    const ocup = reservas.some(r => r["ID Sala"] === salaId && r["Fecha"] === fecha && r["Hora inicio"] === h && r["Estado"] !== "Cancelada");
    return `<div class="slot ${ocup?"taken":"free"}" id="slot-${h}" onclick="${ocup?"":"selectSlot('"+h+"')"}">${h}hs</div>`;
  }).join("");
  updateResumen();
}

function selectSlot(h) {
  slotSel = h;
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  const el = document.getElementById("slot-"+h);
  if (el) el.classList.add("selected");
  updateResumen();
}

function updateAmenities() {
  const salaId = document.getElementById("res-sala").value;
  const sala   = salas.find(s => s["ID Sala"] === salaId);
  const wrap   = document.getElementById("amenities-wrap");
  if (!sala) { wrap.innerHTML = `<span style="font-size:12px;color:var(--text-muted);">—</span>`; return; }
  const amenities = (sala["Amenities"] || "").split(",").map(a=>a.trim()).filter(Boolean);
  wrap.innerHTML = amenities.map(a=>`<span class="tag">${a}</span>`).join("") || `<span style="font-size:12px;color:var(--text-muted);">—</span>`;
}

function updateResumen() {
  const salaId = document.getElementById("res-sala").value;
  const sala   = salas.find(s => s["ID Sala"] === salaId);
  const fecha  = document.getElementById("res-fecha").value;
  const motivo = document.getElementById("res-motivo")?.value || "";
  const body   = document.getElementById("resumen-body");
  if (!sala || !fecha || !slotSel) { body.innerHTML = `<span style="color:var(--text-muted);font-size:13px;">Completá el formulario para ver el resumen.</span>`; return; }
  const horaFin = String(parseInt(slotSel)+1).padStart(2,"0") + ":00";
  body.innerHTML = `
    <div class="summary-row"><span class="summary-label">Sala</span><span class="summary-value">${sala["Nombre de sala"]}</span></div>
    <div class="summary-row"><span class="summary-label">Piso</span><span class="summary-value">${sala["Piso"]}</span></div>
    <div class="summary-row"><span class="summary-label">Fecha</span><span class="summary-value">${fecha}</span></div>
    <div class="summary-row"><span class="summary-label">Horario</span><span class="summary-value">${slotSel}hs – ${horaFin}hs</span></div>
    ${motivo ? `<div class="summary-row"><span class="summary-label">Motivo</span><span class="summary-value">${motivo}</span></div>` : ""}
    <div class="summary-row"><span class="summary-label">Reservado por</span><span class="summary-value">${usuario.nombre}</span></div>`;
}

async function hacerReserva() {
  const salaId = document.getElementById("res-sala").value;
  const sala   = salas.find(s => s["ID Sala"] === salaId);
  const fecha  = document.getElementById("res-fecha").value;
  const motivo = document.getElementById("res-motivo").value || "Sin descripción";
  const asist  = document.getElementById("res-asistentes").value;
  if (!salaId || !fecha || !slotSel) { showToast("Completá sala, fecha y horario", true); return; }
  const horaFin = String(parseInt(slotSel)+1).padStart(2,"0") + ":00";
  const btn = document.getElementById("btn-reservar");
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span>Guardando...`;
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        salaId,
        salaNombre: sala["Nombre de sala"],
        fecha, horaInicio: slotSel, horaFin,
        usuario: usuario.nombre, email: usuario.email,
        motivo, asistentes: asist
      })
    });
    const data = await res.json();
    if (data.ok) {
      showToast("Reserva confirmada");
      await loadData();
      slotSel = null;
      document.getElementById("res-motivo").value = "";
      renderSlots();
      document.getElementById("resumen-body").innerHTML = `<div style="background:var(--green-light);color:var(--green-text);border-radius:6px;padding:12px;font-size:13px;font-weight:500;">Reserva confirmada.</div>`;
    } else {
      showToast("Error al guardar: " + data.error, true);
    }
  } catch(e) {
    showToast("Error de conexión. Verificá la URL del script.", true);
  }
  btn.disabled = false;
  btn.innerHTML = "Confirmar reserva";
}

// ── MIS RESERVAS ───────────────────────────────────────────
function renderMisReservas(filtro = "todas") {
  let mis = reservas.filter(r => r["Email"] === usuario.email);
  if (filtro === "proximas") mis = mis.filter(r => r["Fecha"] >= HOY);
  if (filtro === "pasadas")  mis = mis.filter(r => r["Fecha"] < HOY);
  mis.sort((a,b) => b["Fecha"].localeCompare(a["Fecha"]));
  const list = document.getElementById("mis-reservas-list");
  if (!mis.length) { list.innerHTML = `<div class="empty">No hay reservas para mostrar.</div>`; return; }
  list.innerHTML = mis.map((r, idx) => {
    const sala   = salas.find(s => s["ID Sala"] === r["ID Sala"]);
    const nombre = sala ? sala["Nombre de sala"] : r["ID Sala"];
    const color  = COLORES[idx % COLORES.length];
    const ctext  = COLORES_TEXT[idx % COLORES_TEXT.length];
    const ini    = nombre.replace("Sala ","").substring(0,2).toUpperCase();
    const pasada = r["Fecha"] < HOY;
    const estado = r["Estado"] || "Confirmada";
    const bClass = estado === "Cancelada" ? "badge-red" : pasada ? "badge-blue" : "badge-green";
    return `<div class="res-row">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="res-icon" style="background:${color};color:${ctext};">${ini}</div>
        <div>
          <div class="res-title">${r["Motivo / descripción"] || "Sin descripción"}</div>
          <div class="res-meta">${nombre} · Piso ${sala?.["Piso"] || "?"}</div>
        </div>
      </div>
      <div class="res-right">
        <div class="res-date">${r["Fecha"]} · ${r["Hora inicio"]}hs</div>
        ${!pasada && estado !== "Cancelada"
          ? `<button class="btn btn-danger" onclick="cancelarReserva('${r["ID Reserva"]}')">Cancelar</button>`
          : `<span class="badge ${bClass}">${estado === "Cancelada" ? "Cancelada" : "Finalizada"}</span>`}
      </div>
    </div>`;
  }).join("");
}

async function cancelarReserva(id) {
  if (!confirm("¿Cancelar esta reserva?")) return;
  try {
    await fetch(`${SCRIPT_URL}?action=cancelar&id=${id}`);
    showToast("Reserva cancelada");
    await loadData();
    renderMisReservas("todas");
  } catch(e) {
    showToast("Error al cancelar", true);
  }
}

// ── ADMIN ──────────────────────────────────────────────────
function renderAdmin() {
  const hoyRes = reservas.filter(r => r["Fecha"] === HOY && r["Estado"] !== "Cancelada");
  const ocup   = salas.length ? Math.round((hoyRes.length / (salas.length * 5)) * 100) : 0;
  document.getElementById("stats-grid").innerHTML = `
    <div class="stat"><div class="stat-num">${hoyRes.length}</div><div class="stat-label">Reservas hoy</div></div>
    <div class="stat"><div class="stat-num">${ocup}%</div><div class="stat-label">Ocupación promedio</div></div>
    <div class="stat"><div class="stat-num">${salas.length}</div><div class="stat-label">Salas activas</div></div>`;
  const sorted = [...reservas].sort((a,b) => b["Fecha"].localeCompare(a["Fecha"]));
  const list   = document.getElementById("admin-list");
  if (!sorted.length) { list.innerHTML = `<div class="empty">Sin reservas aún.</div>`; return; }
  list.innerHTML = sorted.map(r => {
    const sala = salas.find(s => s["ID Sala"] === r["ID Sala"]);
    const estado = r["Estado"] || "Confirmada";
    const bClass = estado === "Cancelada" ? "badge-red" : estado === "Finalizada" ? "badge-blue" : "badge-green";
    return `<div class="res-row">
      <div>
        <div class="res-title">${r["Motivo / descripción"] || "Sin descripción"}</div>
        <div class="res-meta">${r["Nombre usuario"]} · ${sala?.["Nombre de sala"] || r["ID Sala"]}</div>
      </div>
      <div class="res-right">
        <div class="res-date">${r["Fecha"]} · ${r["Hora inicio"]}hs</div>
        <span class="badge ${bClass}">${estado}</span>
      </div>
    </div>`;
  }).join("");
}

// ── NAV ────────────────────────────────────────────────────
function showSection(id) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  const labels = { disponibilidad:"Disponibilidad", reservar:"Reservar", "mis-reservas":"Mis reservas", admin:"Admin" };
  document.querySelectorAll(".nav-btn").forEach(b => { if (b.textContent === labels[id]) b.classList.add("active"); });
  if (id === "disponibilidad") renderDisponibilidad();
  if (id === "reservar")       { populateSalaSelect(); renderSlots(); }
  if (id === "mis-reservas")   renderMisReservas("todas");
  if (id === "admin")          renderAdmin();
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg, error=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast show" + (error ? " error" : "");
  setTimeout(() => { t.className = "toast"; }, 3000);
}
</script>
